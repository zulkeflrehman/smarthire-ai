# render.yaml — Deploy SmartHire AI to Render with one click
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: smarthire-ai
    runtime: python
    buildCommand: |
      pip install -r requirements-render.txt &&
      python manage.py migrate &&
      python manage.py collectstatic --noinput
    startCommand: gunicorn smarthire.wsgi --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: USE_SEMANTIC_SCORING
        value: "True"
      - key: EMBEDDING_MODEL
        value: "all-MiniLM-L6-v2"
      - key: DATABASE_URL
        fromDatabase:
          name: smarthire-db
          property: connectionString
    plan: free

databases:
  - name: smarthire-db
    databaseName: smarthire
    plan: free
